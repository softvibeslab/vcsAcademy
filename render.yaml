services:
  # Backend API - FastAPI
  - type: web
    name: vcsa-backend
    runtime: docker
    region: oregon
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHON_VERSION
        value: 3.13
      - key: DB_NAME
        value: vcsa
      - key: MONGO_URL
        fromDatabase:
          name: vcsa-mongodb
          property: connectionString
      - key: STRIPE_API_KEY
        sync: false

databases:
  # MongoDB Database (Managed by Render)
  - name: vcsa-mongodb
    databaseName: vcsa
    user: vcsa_user
    plan: free

# Instructions:
# 1. Create a Render account at https://render.com
# 2. Fork this repository
# 3. Connect your GitHub repo to Render
# 4. Create New + → "Blueprint" → Select your repo
# 5. Render will detect render.yaml and deploy both services
# 6. The backend will automatically connect to MongoDB using the connection string
